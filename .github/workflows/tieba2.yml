# 每天6:30执行北京时间

name: Start

on:
  workflow_dispatch:  # 加这个，方便你手动点
  push:
    branches: [ main ]  # 限制下分支，避免 feature 分支也触发
  schedule:
    - cron: '30 22 * * *'  # UTC 22:30 = 北京时间 6:30

jobs:
  TiebaSignIn:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5  # v3 -> v5，支持 Node 24

    - name: Set up JDK 1.8
      uses: actions/setup-java@v4  # v1 -> v4
      with:
        distribution: 'temurin'  # 新版必须指定发行版
        java-version: '8'
        cache: maven  # v4 自带 maven 缓存，不用单独用 cache@v3 了

    - name: Build with Maven
      env:
        BDUSS: ${{ secrets.BDUSS }}
        SCKEY: ${{ secrets.SCKEY }}
      run: |
        mvn compile exec:java -Dexec.mainClass="top.srcrs.Run" -Dexec.args="${BDUSS} ${SCKEY}"
